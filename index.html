<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Presupuesto</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="hero" id="welcomeHero">
      <div class="hero-content">
        <div class="eyebrow">✨ Nueva actualización</div>
        <h1 class="title">Mi Presupuesto</h1>
        <p class="subtitle">App tipo flujo para controlar ingresos, gastos y familia.</p>
      </div>
    </section>

    <section class="shell">
      <aside class="steps">
        <div class="step-pill active" data-pill="0">1 Inicio</div>
        <div class="step-pill" data-pill="1">2 Gastos</div>
        <div class="step-pill" data-pill="2">3 Resumen</div>
        <div class="step-pill" data-pill="3">4 Ajustes</div>
        <div class="step-pill" data-pill="4">5 Final</div>
      </aside>

      <div>
        <section class="panel active" data-panel="0">
          <h2>Inicio</h2>
          <input id="nombre" placeholder="Nombre">
          <input id="ingresos" type="number" placeholder="Ingresos">
          <button onclick="guardarInicio()">Continuar</button>
        </section>

        <section class="panel" data-panel="1">
          <h2>Gastos</h2>
          <select id="categoria"></select>
          <input id="montoGasto" type="number">
          <input id="detalleGasto">
          <input id="dependiente" placeholder="Hijo (opcional)">
          <button onclick="agregarGasto()">Agregar</button>
          <div id="listaGastos"></div>
          <button onclick="terminarGastos()">Continuar</button>
        </section>

        <section class="panel" data-panel="2">
          <h2>Resumen</h2>
          <div id="viewIngresos"></div>
          <div id="viewGastos"></div>
          <div id="viewSaldo"></div>
          <div id="resumenDependientes"></div>
          <button onclick="irAjustes()">Ajustar</button>
        </section>

        <section class="panel" data-panel="3">
          <h2>Ajustes</h2>
          <div id="listaAjustes"></div>
          <button onclick="calcularAjustes()">Calcular</button>
        </section>

        <section class="panel" data-panel="4">
          <h2>Resultado</h2>
          <div id="resultadoAjustes"></div>
        </section>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
